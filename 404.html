<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Unavailable | STACKLY Atelier</title>
    <!-- Google Typography Integration Links -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --theme-emerald-dark: #051410;
            --theme-gold: #DFB76C;
            --theme-white: #FAFAF7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--theme-emerald-dark);
            color: var(--theme-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            text-align: center;
            padding: 2rem;
        }

        .error-canvas-wrapper {
            max-width: 550px;
            position: relative;
        }

        .error-num-heading {
            font-family: 'Playfair Display', serif;
            font-size: 7.5rem;
            font-weight: 400;
            line-height: 1;
            color: rgba(223, 183, 108, 0.08); /* Minimal ghostly luxury background numbering shadow */
            letter-spacing: 0.05em;
            margin-bottom: -2.5rem;
            user-select: none;
        }

        .error-editorial-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 400;
            font-style: italic;
            color: var(--theme-white);
            letter-spacing: 0.02em;
            margin-bottom: 1.25rem;
            text-shadow: 0 0 15px rgba(250, 247, 242, 0.1);
        }

        .error-summary-desc {
            font-size: 0.85rem;
            line-height: 1.8;
            color: #8FA39E;
            margin-bottom: 2.5rem;
            letter-spacing: 0.02em;
        }

        /* Container grouping both actions horizontally */
        .error-actions-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }

        /* Base styles for both action items */
        .error-btn {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 500;
            padding: 1.1rem 2rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            border: none;
            font-family: 'Poppins', sans-serif;
        }

        /* Primary Action: Gold Button */
        .error-return-home-link {
            background-color: var(--theme-gold);
            color: #051410;
            box-shadow: 0 4px 15px rgba(223, 183, 108, 0.15);
        }

        .error-return-home-link:hover {
            background-color: var(--theme-white);
            box-shadow: 0 0 25px rgba(250, 250, 247, 0.4);
            transform: translate3d(0, -2px, 0);
        }

        /* Secondary Action: Styled Back Button with a Gold Border */
        .error-back-btn {
            background-color: transparent;
            color: var(--theme-gold);
            border: 1px solid var(--theme-gold);
        }

        .error-back-btn:hover {
            background-color: rgba(223, 183, 108, 0.08);
            transform: translate3d(0, -2px, 0);
        }

        /* Responsive stack for smaller screen viewports */
        @media (max-width: 500px) {
            .error-actions-container {
                flex-direction: column;
                gap: 0.75rem;
            }
            .error-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- LUXURY EDITORIAL ERROR PANEL DISPLAY CONTENT CARD -->
    <main class="error-canvas-wrapper">
        <div class="error-num-heading">404</div>
        <h1 class="error-editorial-title">Exhibition Vault Closed</h1>
        <p class="error-summary-desc">
            The seasonal creation lookbook or collection item partition path you are exploring is currently locked, archived, or undergoing algorithmic maintenance inside our digital atelier catalogs.
        </p>
        
        <!-- Button Wrapper Container -->
        <div class="error-actions-container">
            <!-- Native JavaScript back function triggered on click -->
            <button onclick="history.back()" class="error-btn error-back-btn">
                Go Back
            </button>
            <a href="index.html" class="error-btn error-return-home-link">
                Return To Main Site
            </a>
        </div>
    </main>

</body>
</html>
