<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Bag | Vault Checkout</title>
  <!-- Main layout style file link -->
  <link rel="stylesheet" href="style.css">
  <!-- Premium typography embedding links -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body class="luxury-body">

  <!-- Shared Global Header Panel Setup -->
  <header class="luxury-header">
    <div class="header-container">
      <div class="logo"><a href="index.html">STACKLY</a></div>
      
      <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
      </nav>

      <div class="header-actions">
        <!-- Wishlist Link -->
        <div class="action-item" id="wishlist-menu-wrapper">
          <a href="wishlist.html" class="action-btn" aria-label="Wishlist View">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <span class="badge-count" id="wishlist-count">0</span>
          </a>
        </div>

        <!-- Shopping Cart Trigger Button (Active) -->
        <div class="action-item" id="cart-menu-wrapper">
          <a href="cart.html" class="action-btn active-page-link" aria-label="Shopping Cart View">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="badge-count" id="cart-count">0</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Viewport Cart Split Screen Layout Section -->
  <main class="page-viewport-section">
    <div class="page-container cart-page-split">
      
      <!-- Left Column: Itemised Products Grid Allocation -->
      <div class="cart-items-column">
        <div class="cart-header-left">
          <h1 class="cart-main-title">Shopping Bag</h1>
          <span class="cart-subtitle-count" id="cart-title-count">0 items</span>
        </div>
        <div class="luxury-divider-left"></div>
        
        <div id="cart-page-items-list" class="cart-items-stack">
          <!-- Rendered dynamically via javascript -->
        </div>
      </div>
      
      <!-- Right Column: Premium Order Summary Sidebar Sticky Panel -->
      <div class="cart-summary-sidebar">
        <h2 class="summary-title">Acquisition Summary</h2>
        
        <div class="summary-details-box">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="summary-subtotal" class="summary-value">$0</span>
          </div>
          <div class="summary-row">
            <span>Insured Courier Delivery</span>
            <span class="summary-value complimentary-gold">Complimentary</span>
          </div>
          <div class="summary-row">
            <span>Valuation Tax</span>
            <span class="summary-value complimentary-gold">Calculated at Checkout</span>
          </div>
        </div>
        
        <div class="summary-row total-row">
          <span>Estimated Total</span>
          <span id="summary-total" class="final-total-price">$0</span>
        </div>
        
        <button class="checkout-final-btn" onclick="triggerCheckoutAlert()">Proceed To Checkout</button>
        
        <div class="security-assurance-tag">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <span>End-to-End Encrypted Secure Server Connection</span>
        </div>
      </div>

    </div>
  </main>

  <style>
    /* --- CART PAGE MAIN FLEX LAYOUT CONFIGURATIONS --- */
.cart-page-split {
  display: grid;
  grid-template-columns: 7fr 4fr;
  gap: 60px;
  align-items: start;
}

.cart-header-left {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.cart-main-title {
  font-size: 2.4rem;
  font-weight: 400;
  margin: 0;
  letter-spacing: 1px;
}

.cart-subtitle-count {
  font-size: 1rem;
  color: #A3B8B3;
  letter-spacing: 1.5px;
}

.luxury-divider-left {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, rgba(212, 175, 55, 0.4), rgba(212, 175, 55, 0));
  margin: 20px 0 40px 0;
}

/* --- ITEM ROWS AND GRID MODULES STRUCTURES --- */
.cart-items-stack {
  display: flex;
  flex-direction: column;
}

.cart-item-row {
  display: flex;
  gap: 24px;
  padding: 30px 0;
  border-bottom: 1px solid rgba(212, 175, 55, 0.12);
  align-items: center;
  position: relative;
  transition: all 0.3s ease;
}

.cart-row-img-wrapper {
  width: 110px;
  height: 140px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
}

.cart-row-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cart-row-details {
  flex-grow: 1;
}

.cart-row-name {
  font-size: 1.4rem;
  font-weight: 400;
  margin: 0 0 6px 0;
  letter-spacing: 0.5px;
}

.cart-row-mat {
  font-family: sans-serif;
  font-size: 0.8rem;
  color: #A3B8B3;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 0 0 20px 0;
}

.cart-row-price {
  font-size: 1.35rem;
  color: #D4AF37;
  font-weight: 500;
}

/* Row Action Close Button Trigger Interface styling specs */
.cart-row-remove-btn {
  background: transparent;
  border: none;
  color: rgba(255, 107, 107, 0.7);
  cursor: pointer;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: bold;
  padding: 10px;
  transition: all 0.3s ease;
}

.cart-row-remove-btn:hover {
  color: #ff6b6b;
  text-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
  transform: scale(1.05);
}

/* --- PREMIUM SIDEBAR STICKY ORDER SUMMARY BOX LOOKS --- */
.cart-summary-sidebar {
  background-color: rgba(4, 37, 29, 0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(212, 175, 55, 0.15);
  padding: 40px 30px;
  border-radius: 4px;
  position: sticky;
  top: 130px; /* Accounts for header height spacing constraints */
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

.summary-title {
  font-size: 1.5rem;
  font-weight: 400;
  margin: 0 0 25px 0;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.15);
  padding-bottom: 15px;
}

.summary-details-box {
  margin-bottom: 30px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  margin: 18px 0;
  font-family: sans-serif;
  font-size: 0.9rem;
  color: #CCCCCC;
}

.summary-value {
  color: #FFFFFF;
}

.complimentary-gold {
  color: #D4AF37;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  letter-spacing: 0.5px;
}

.total-row {
  border-top: 1px solid rgba(212, 175, 55, 0.15);
  padding-top: 25px;
  margin-top: 25px;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: #FFFFFF;
}

.final-total-price {
  color: #D4AF37;
  font-weight: bold;
}

/* Secure Checkout Main CTA Block configuration settings */
.checkout-final-btn {
  width: 100%;
  padding: 16px;
  background-color: #D4AF37;
  color: #031E17;
  border: 1px solid #D4AF37;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 1, 0.3, 1);
}

.checkout-final-btn:hover {
  background-color: transparent;
  color: #FFFFFF;
  box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
}

.security-assurance-tag {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
  font-family: sans-serif;
  font-size: 0.75rem;
  color: #A3B8B3;
}

/* Fallback Module structures adjustments look mapping configurations setups */
.empty-cart-container {
  text-align: center;
  padding: 80px 20px;
  border: 1px dashed rgba(212, 175, 55, 0.15);
  border-radius: 4px;
}

.empty-cart-container p {
  color: #A3B8B3;
  font-size: 1.2rem;
  margin-bottom: 30px;
}

/* --- RESPONSIVE MEDIA BREAKPOINTS SETUP CONFIGS --- */

@media (max-width: 992px) {
  .cart-page-split {
    grid-template-columns: 1fr; /* Collapses into single columns view layout */
    gap: 50px;
  }
  .cart-summary-sidebar {
    position: static;
    width: 100%;
    box-sizing: border-box;
  }
}

@media (max-width: 600px) {
  .cart-item-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 15px;
  }
  .cart-row-img-wrapper {
    width: 100%;
    height: 240px;
  }
  .cart-row-remove-btn {
    padding-left: 0;
    margin-top: 10px;
  }
}

  </style>

  <script>
    // Local Storage State Initialization Hook Synchronizers 
let cart = JSON.parse(localStorage.getItem('stackly_cart')) || [];
let wishlist = JSON.parse(localStorage.getItem('stackly_wishlist')) || [];

document.addEventListener("DOMContentLoaded", () => {
  syncWebsiteCounters();
  
  // Checking context targeting anchor container layout loops components
  if (document.getElementById('cart-page-items-list')) {
    executeCartLayoutPaintCycle();
  }
});

// Update global counts metrics metrics values layout elements targets sets
function syncWebsiteCounters() {
  const cartCounterTarget = document.getElementById('cart-count');
  const wishlistCounterTarget = document.getElementById('wishlist-count');
  const titleCountTarget = document.getElementById('cart-title-count');
  
  if (cartCounterTarget) cartCounterTarget.innerText = cart.length;
  if (wishlistCounterTarget) wishlistCounterTarget.innerText = wishlist.length;
  if (titleCountTarget) titleCountTarget.innerText = `${cart.length} ${cart.length === 1 ? 'item' : 'items'}`;
}

// Persist adjustments inside the local browser storage buffer segments zones 
function persistStateBuffer() {
  localStorage.setItem('stackly_cart', JSON.stringify(cart));
  localStorage.setItem('stackly_wishlist', JSON.stringify(wishlist));
  syncWebsiteCounters();
}

// Primary Render Engine for mapping product arrays directly into shopping bag rows
function executeCartLayoutPaintCycle() {
  const stackContainer = document.getElementById('cart-page-items-list');
  const subtotalLabel = document.getElementById('summary-subtotal');
  const totalLabel = document.getElementById('summary-total');
  
  if (!stackContainer) return;

  // Render clean fallback block if shopping cart array matches zero items
  if (cart.length === 0) {
    stackContainer.innerHTML = `
      <div class="empty-cart-container">
        <p>Your shopping bag is currently empty.</p>
        <a href="index.html" class="return-exhibition-btn">Browse Collection</a>
      </div>
    `;
    if (subtotalLabel) subtotalLabel.innerText = "$0";
    if (totalLabel) totalLabel.innerText = "$0";
    return;
  }

  // Running total calculation initialization
  let aggregatedTotal = 0;

  // Render product detail rows loop
  stackContainer.innerHTML = cart.map(item => {
    // Strip non-numerical metrics formatting symbols to fetch computational values safely
    const localizedPriceValue = parseInt(item.price.replace(/[^0-9]/g, '')) || 0;
    aggregatedTotal += localizedPriceValue;

    return `
      <div class="cart-item-row" data-id="${item.id}">
        <div class="cart-row-img-wrapper">
          <img src="${item.img}" class="cart-row-img" alt="${item.name}">
        </div>
        <div class="cart-row-details">
          <h3 class="cart-row-name">${item.name}</h3>
          <p class="cart-row-mat">${item.material || 'Exhibitive Masterpiece'}</p>
          <span class="cart-row-price">${item.price}</span>
        </div>
        <button class="cart-row-remove-btn" onclick="executeCartProductRemoval('${item.id}')" aria-label="Remove Product">
          Remove
        </button>
      </div>
    `;
  }).join('');

  // Apply running totals to financial summary tags
  if (subtotalLabel) subtotalLabel.innerText = `$${aggregatedTotal.toLocaleString()}`;
  if (totalLabel) totalLabel.innerText = `$${aggregatedTotal.toLocaleString()}`;
}

// Action Trigger APIs: Filter and pop items completely out of active array layouts structures 
function executeCartProductRemoval(id) {
  cart = cart.filter(product => product.id !== id);
  persistStateBuffer();
  executeCartLayoutPaintCycle(); // Repaint views mapping arrays context shifts elements definitions loops settings look boundary parameters
}

// Action Trigger APIs: Emulate a secure order submission action step 
function triggerCheckoutAlert() {
  if (cart.length === 0) return;
  alert("Redirecting to our secure payment gateway window. Connection secured.");
}

  </script>
</body>
</html>
