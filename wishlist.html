<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Curated Desires | Shopping Bag Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="https://cloudflare.com">
  <link rel="stylesheet" href="style.css">
</head>
<body class="luxury-body">

  <!-- ==========================================================================
     SHARED GLOBAL FIXED LUXURY NAV HEADER BAR
     ========================================================================== -->
  <header class="luxury-header">
    <div class="header-container">
      <div class="logo"><a href="index.html" class="logo-link">STACKLY</a></div>
      
      <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
      </nav>

      <div class="header-actions">
        <div class="action-item" id="wishlist-menu-wrapper">
          <a href="wishlist.html" class="action-btn" aria-label="Wishlist View">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <span class="badge-count" id="wishlist-count">0</span>
          </a>
        </div>

        <div class="action-item" id="cart-menu-wrapper">
          <a href="cart.html" class="action-btn active-page-link" aria-label="Shopping Cart View">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="badge-count" id="cart-count">1</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- ==========================================================================
     PRIMARY SHOPPING BAG SPLIT VIEWS SECTION
     ========================================================================== -->
  <main class="cart-viewport-section">
    <div class="cart-max-container">
      
      <!-- Split Split columns setup balances items and summary pane fluidly -->
      <div class="cart-asymmetric-columns-split">
        
        <!-- LEFT LANE BLOCK: Product Bag List Items Core -->
        <div class="cart-bag-items-column">
          <header class="bag-header-meta-row">
            <h1 class="bag-main-headline-title">Shopping Bag</h1>
            <span class="bag-items-count-ticker">1 ITEM</span>
          </header>
          
          <div class="bag-items-list-wrapper">
            <!-- PRODUCT ROW CARD ITEM 1 -->
            <article class="bag-product-item-row-card">
              <div class="product-visual-image-frame">
                <img src="./Assests/diamondrings.webp" alt="Helios Archway Pendant" class="product-native-img">
              </div>
              
              <div class="product-metadata-details-pane">
                <div class="product-title-row-stack">
                  <h3 class="product-title-text">Helios Archway Pendant</h3>
                  <span class="product-subtitle-tag">EXHIBITIVE MASTERPIECE</span>
                  <!-- FIXED: Corrected $1,850.00 pricing metric variable -->
                  <strong class="product-price-string">$1,850.00</strong>
                </div>
                
                <div class="product-card-actions-row">
                  <button class="product-remove-utility-btn" onclick="window.removeProductItemFromBag(this)" title="Remove item from shopping bag">REMOVE</button>
                </div>
              </div>
            </article>
          </div>
        </div>

        <!-- RIGHT LANE BLOCK: Glassmorphic Acquisition Checkouts Summary Panel -->
        <aside class="cart-acquisition-summary-sidebar">
          <div class="acquisition-glassmorphic-summary-card">
            <h2 class="acquisition-summary-title">Acquisition Summary</h2>
            <div class="summary-gold-hairline"></div>
            
            <!-- Financial Rows Grid Matrix Details -->
            <div class="summary-financials-matrix-table">
              <div class="financial-row">
                <span class="row-label">Subtotal</span>
                <!-- FIXED: Synchronized matching $1,850.00 calculation variable -->
                <strong class="row-value-number" id="summary-subtotal-val">$1,850.00</strong>
              </div>
              <div class="financial-row">
                <span class="row-label">Insured Courier Delivery</span>
                <strong class="row-value-number accent-complimentary">Complimentary</strong>
              </div>
              <div class="financial-row">
                <span class="row-label">Valuation Tax</span>
                <strong class="row-value-number accent-muted">Calculated at Checkout</strong>
              </div>
            </div>

            <div class="summary-total-divider-line"></div>

            <div class="financial-row total-row-highlight">
              <span class="row-label font-large-bold">Estimated Total</span>
              <!-- FIXED: Synchronized matching $1,850.00 estimated aggregate value -->
              <strong class="row-value-number font-large-bold-gold" id="summary-total-val">$1,850.00</strong>
            </div>

            <!-- Secure Action Trigger Button Checkout Navigation Link -->
            <button class="acquisition-checkout-glow-btn" onclick="window.initializeSecureGatewayCheckoutRoute(event)">
              PROCEED TO CHECKOUT
            </button>

            <!-- Encrypted Encryption Status Bar Labels Footer -->
            <div class="acquisition-secure-encryption-footer">
              <i class="fa-solid fa-lock security-lock-icon"></i>
              <span class="security-status-text">End to End Encrypted Secure Server Connection</span>
            </div>
          </div>
        </aside>

      </div>

    </div>
  </main>

  <script>
    /* ==========================================================================
       DASHBOARD BAG UTILITY EVENT INTERCEPT CONTROLLERS
       ========================================================================== */
    window.removeProductItemFromBag = function(buttonClickedElement) {
        if (!buttonClickedElement) return;
        const confirmRemoval = confirm("Remove Exhibitive Masterpiece?\n\nAre you sure you want to dismiss the Helios Archway Pendant from your active shopping bag session?");
        if (confirmRemoval) {
            const productCard = buttonClickedElement.closest(".bag-product-item-row-card");
            if (productCard) {
                productCard.style.opacity = "0";
                productCard.style.transform = "translate3d(-20px, 0, 0)";
                setTimeout(() => {
                    productCard.remove();
                    document.querySelector(".bag-items-count-ticker").innerText = "0 ITEMS";
                    document.getElementById("cart-count").innerText = "0";
                    document.getElementById("summary-subtotal-val").innerText = "$0.00";
                    document.getElementById("summary-total-val").innerText = "$0.00";
                }, 400);
            }
        }
    };

    window.initializeSecureGatewayCheckoutRoute = function(event) {
        if (event) event.preventDefault();
        console.log("Initializing secure encrypted payment gateway routing channels.");
        alert("Initializing Secure Gateway Integration.\n\nConnecting directly to STACKLY Insured Transits Merchant vaults. Establishing your secure checkout session...");
    };
  </script>
  
  <style>
    /* ==========================================================================
   STACKLY Fine Jewellery — PREMIUM SHOPPING INTERFACE SYSTEM STYLES
   ========================================================================== */
:root {
    --theme-emerald: #09261E;       /* Deep Luxury Base Alpha */
    --theme-emerald-dark: #051410;  /* Obsidian Primary Base Canvas */
    --theme-gold: #DFB76C;         /* Champagne Metallic Text Glow Highlighting */
    --theme-white: #FAFAF7;        /* Alabaster Clean Neutral Text */
    --theme-text-muted: #8FA39E;   /* Matte Gray-Green Metadata Labels */
}

* { margin: 0; padding: 0; box-sizing: border-box; }

.luxury-body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--theme-emerald-dark);
    color: var(--theme-white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* ==========================================================================
   Top Fixed Header Bar Configurations
   ========================================================================== */
.luxury-header {
    width: 100% !important;
    height: 80px;
    background-color: rgba(5, 20, 16, 0.95);
    border-bottom: 1px solid rgba(223, 183, 108, 0.1);
    display: flex;
    align-items: center;
    position: fixed;
    top: 0; left: 0;
    z-index: 1000;
    padding: 0 4rem;
}

.header-container { width: 100%; max-width: 1340px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.logo .logo-link { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 0.15em; color: var(--theme-white); text-decoration: none; font-weight: 400; }
.logo .logo-link:hover { color: var(--theme-gold); }

.nav-menu { display: flex; gap: 2.5rem; }
.nav-menu a { font-family: 'Poppins', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--theme-text-muted); text-decoration: none; font-weight: 500; transition: color 0.3s ease; }
.nav-menu a:hover { color: var(--theme-white); }

.header-actions { display: flex; align-items: center; gap: 1.5rem; }
.action-item { position: relative; }
.action-btn { color: var(--theme-text-muted); display: flex; align-items: center; justify-content: center; padding: 0.5rem; text-decoration: none; transition: color 0.3s ease; }
.action-btn:hover, .action-btn.active-page-link { color: var(--theme-gold); }

.badge-count { position: absolute; top: -2px; right: -2px; background-color: var(--theme-gold); color: var(--theme-emerald-dark); font-size: 0.55rem; font-weight: 600; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

/* ==========================================================================
   Primary Section Canvas Layout Splits
   ========================================================================== */
.cart-viewport-section {
    width: 100% !important;
    margin-top: 80px; /* Pushes content clear of fixed navigation bar height */
    padding: 5rem 0;
    flex: 1;
}

.cart-max-container {
    max-w: 1340px;
    margin: 0 auto;
    padding: 0 4rem;
    width: 100%;
}

.cart-asymmetric-columns-split {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 4.5rem;
    width: 100%;
}

/* Left Column Lane: Product list row setups */
.cart-bag-items-column {
    width: 58%;
    display: flex;
    flex-direction: column;
}

.bag-header-meta-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid rgba(250, 250, 247, 0.08);
    padding-bottom: 1.25rem;
    margin-bottom: 2rem;
}

.bag-main-headline-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 400; color: var(--theme-white); letter-spacing: 0.01em; }
.bag-items-count-ticker { font-family: 'Poppins', sans-serif; font-size: 0.72rem; letter-spacing: 0.15em; color: var(--theme-text-muted); font-weight: 500; }

.bag-items-list-wrapper { display: flex; flex-direction: column; gap: 2rem; }

.bag-product-item-row-card {
    display: flex;
    align-items: flex-start;
    gap: 2rem;
    border-bottom: 1px solid rgba(250, 250, 247, 0.04);
    padding-bottom: 2rem;
    width: 100%;
    transform: translate3d(0, 0, 0);
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.product-visual-image-frame {
    width: 120px;
    aspect-ratio: 1 / 1;
    border-radius: 4px;
    overflow: hidden;
    background-color: var(--theme-emerald);
    border: 1px solid rgba(250, 250, 247, 0.04);
    flex-shrink: 0;
}

.product-native-img { width: 100%; height: 100%; object-fit: cover; object-position: center; transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1); }
.bag-product-item-row-card:hover .product-native-img { transform: scale(1.05); }

.product-metadata-details-pane { flex: 1; display: flex; flex-direction: column; justify-content: space-between; height: 120px; text-align: left; }
.product-title-row-stack { display: flex; flex-direction: column; gap: 4px; }
.product-title-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 400; color: var(--theme-white); }
.product-subtitle-tag { font-family: 'Poppins', sans-serif; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--theme-text-muted); font-weight: 500; text-transform: uppercase; }
.product-price-string { font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 500; color: var(--theme-gold); margin-top: 0.5rem; }

.product-card-actions-row { display: flex; justify-content: flex-end; width: 100%; }
.product-remove-utility-btn { background: transparent; border: none; font-family: 'Poppins', sans-serif; font-size: 0.68rem; letter-spacing: 0.15em; color: var(--theme-text-muted); font-weight: 500; cursor: pointer; padding: 4px; transition: color 0.3s ease; }
.product-remove-utility-btn:hover { color: #F87171; } /* Light alert warning red on hover passes */

/* ==========================================================================
   Right Column Lane: Glassmorphic Billing Summary Panel Core
   ========================================================================== */
.cart-acquisition-summary-sidebar {
    width: 36%;
    position: sticky;
    top: 130px; /* Snaps and anchors card dynamically during desktop page scrolls */
}

.acquisition-glassmorphic-summary-card {
    background: rgba(9, 38, 30, 0.35); /* Translucent White-Emerald Alpha Tint */
    border: 1px solid rgba(223, 183, 108, 0.15); /* Gold perimeter wire trace seam */
    border-radius: 6px;
    padding: 3rem 2.25rem;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    display: flex;
    flex-direction: column;
}

.acquisition-summary-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 400; color: var(--theme-white); letter-spacing: 0.01em; text-align: left; }
.summary-gold-hairline { width: 45px; height: 1px; background-color: var(--theme-gold); margin: 1.5rem 0 2.25rem 0; }

.summary-financials-matrix-table { display: flex; flex-direction: column; gap: 1.2rem; }

.financial-row { display: flex; align-items: center; justify-content: space-between; width: 100%; text-align: left; }
.financial-row .row-label { font-family: 'Poppins', sans-serif; font-size: 0.78rem; color: var(--theme-text-muted); }
.financial-row .row-value-number { font-family: 'Poppins', sans-serif; font-size: 0.85rem; color: var(--theme-white); font-weight: 500; }
.financial-row .row-value-number.accent-complimentary { color: #34D399; font-weight: 400; font-size: 0.78rem; font-style: italic; }
.financial-row .row-value-number.accent-muted { color: var(--theme-text-muted); font-size: 0.74rem; font-style: italic; font-weight: 400; }

.summary-total-divider-line { height: 1px; background-color: rgba(250, 250, 247, 0.06); margin: 2rem 0; width: 100%; }

.total-row-highlight .row-label.font-large-bold { font-size: 0.9rem; color: var(--theme-white); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.total-row-highlight .font-large-bold-gold { font-family: 'Poppins', sans-serif; font-size: 1.35rem; font-weight: 600; color: var(--theme-gold); text-shadow: 0 0 10px rgba(223, 183, 108, 0.15); }

/* Luminous Submit Checkout Button Link */
.acquisition-checkout-glow-btn {
    width: 100%;
    background-color: var(--theme-gold);
    color: var(--theme-emerald-dark);
    border: none;
    border-radius: 4px;
    padding: 1.25rem;
    font-family: 'Poppins', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(223, 183, 108, 0.15);
    margin: 2.5rem 0 1.5rem 0;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.acquisition-checkout-glow-btn:hover {
    background-color: var(--theme-white);
    color: #051410;
    box-shadow: 0 0 25px rgba(250, 250, 247, 0.45), 0 4px 15px rgba(0,0,0,0.2);
    transform: translate3d(0, -2px, 0);
}

/* Secure Server Footer Elements Row */
.acquisition-secure-encryption-footer { display: flex; align-items: center; justify-content: center; gap: 0.6rem; opacity: 0.4; transition: opacity 0.3s ease; }
.acquisition-glassmorphic-summary-card:hover .acquisition-secure-encryption-footer { opacity: 0.7; }
.security-lock-icon { font-size: 0.68rem; color: var(--theme-white); }
.security-status-text { font-family: 'Poppins', sans-serif; font-size: 0.58rem; letter-spacing: 0.05em; color: var(--theme-white); font-weight: 400; text-transform: uppercase; }

/* ==========================================================================
   FLUID MASTER RESPONSIVE BREAKPOINTS ENGINE (FLUID VIEWS SCALERS)
   ========================================================================== */
@media screen and (max-width: 1200px) {
    .luxury-header { padding: 0 2rem; }
    .cart-max-container { padding: 0 2rem; }
.cart-asymmetric-columns-split { gap: 2.5rem; }}@media screen and (max-width: 992px) {/* Collapse side-by-side columns into centered vertical stacks on medium screens and landscape tablets */.cart-asymmetric-columns-split { flex-direction: column; align-items: center; gap: 4rem; }.cart-bag-items-column { width: 100%; }.cart-acquisition-summary-sidebar { width: 100%; max-width: 580px; position: relative; top: 0; }.acquisition-glassmorphic-summary-card { padding: 3rem 2rem; }}@media screen and (max-width: 640px) {.luxury-header { padding: 0 1.5rem; height: 70px; }.nav-menu { display: none; } /* Strips desktop horizontal link menus on smartphones to secure layout space */.cart-viewport-section { margin-top: 70px; padding: 3rem 0; }.cart-max-container { padding: 0 1.25rem; }.bag-main-headline-title { font-size: 1.8rem; }.bag-product-item-row-card { gap: 1.25rem; padding-bottom: 1.5rem; }.product-visual-image-frame { width: 90px; }.product-metadata-details-pane { height: 90px; }.product-title-text { font-size: 1.1rem; }.product-price-string { font-size: 0.95rem; margin-top: 2px; }.acquisition-glassmorphic-summary-card { padding: 2.25rem 1.25rem; }.acquisition-checkout-glow-btn { padding: 1.1rem; font-size: 0.68rem; margin: 2rem 0 1.25rem 0; }}
  </style>
</body>
</html>
